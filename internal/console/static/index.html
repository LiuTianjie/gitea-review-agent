<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>codex-gitea 控制台</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", Roboto, sans-serif;
    margin: 0; padding: 0; line-height: 1.5;
    background: #f6f7f9; color: #1c1e21;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #16181c; color: #e6e8eb; }
    section { background: #1f2329 !important; border-color: #30353c !important; }
    input, select { background: #16181c; color: #e6e8eb; border-color: #30353c; }
    th { background: #262b32 !important; }
    tr:nth-child(even) td { background: #1b1f24; }
    .muted { color: #8b9096 !important; }
  }
  header { padding: 16px 24px; border-bottom: 1px solid #d8dbdf; }
  header h1 { margin: 0; font-size: 18px; }
  main { max-width: 900px; margin: 0 auto; padding: 16px 24px 64px; }
  section {
    background: #fff; border: 1px solid #e1e4e8; border-radius: 8px;
    padding: 16px 20px; margin: 16px 0;
  }
  section h2 { margin-top: 0; font-size: 15px; letter-spacing: .02em; }
  label { display: block; margin: 10px 0 2px; font-size: 13px; font-weight: 600; }
  input, select { width: 100%; padding: 8px 10px; border: 1px solid #ccd0d5; border-radius: 6px; font-size: 14px; }
  button {
    margin-top: 12px; padding: 8px 16px; border: 0; border-radius: 6px;
    background: #2563eb; color: #fff; font-size: 14px; cursor: pointer;
  }
  button:hover { background: #1d4ed8; }
  button.secondary { background: #6b7280; }
  button.secondary:hover { background: #4b5563; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; }
  .row > div { flex: 1 1 200px; }
  .msg { margin-top: 10px; font-size: 13px; min-height: 18px; }
  .ok { color: #15803d; }
  .err { color: #b91c1c; }
  .muted { color: #6b7280; font-size: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #e1e4e8; }
  th { background: #f0f2f5; position: sticky; top: 0; }
  .badge { padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .s-done { background: #dcfce7; color: #166534; }
  .s-failed { background: #fee2e2; color: #991b1b; }
  .s-running { background: #dbeafe; color: #1e40af; }
  .s-pending { background: #fef9c3; color: #854d0e; }
  .s-superseded { background: #e5e7eb; color: #374151; }
  code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
  pre.log {
    margin: 6px 0 10px; padding: 10px; border: 1px solid #e5e7eb; border-radius: 6px;
    background: #f9fafb; color: #7f1d1d; white-space: pre-wrap; word-break: break-word;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px;
  }
  .compact { font-size: 12px; color: #4b5563; }
</style>
</head>
<body>
<header><h1>codex-gitea 控制台</h1></header>
<main>

  <section>
    <h2>Gitea 与审查设置</h2>
    <div class="row">
      <div>
        <label for="gitea_url">Gitea 地址</label>
        <input id="gitea_url" placeholder="https://gitea.example.com">
      </div>
      <div>
        <label for="gitea_token">Gitea 令牌</label>
        <input id="gitea_token" type="password" placeholder="（留空则保持不变）">
      </div>
    </div>
    <div class="row">
      <div>
        <label for="webhook_secret">Webhook 密钥</label>
        <input id="webhook_secret" type="password" placeholder="（留空则保持不变）">
      </div>
      <div>
        <label for="model">模型</label>
        <input id="model" placeholder="gpt-5-codex">
      </div>
    </div>
    <div class="row">
      <div>
        <label for="trigger_keywords">触发关键词（英文逗号分隔）</label>
        <input id="trigger_keywords" placeholder="/review,@review">
      </div>
      <div>
        <label for="concurrency">并发数</label>
        <input id="concurrency" type="number" min="1" placeholder="2">
      </div>
    </div>
    <div class="row">
      <div>
        <label for="codex_auth_mode">Codex 鉴权模式</label>
        <select id="codex_auth_mode">
          <option value="authfile">authfile（auth.json）</option>
          <option value="apikey">apikey</option>
        </select>
      </div>
      <div>
        <label for="codex_api_key">Codex API 密钥</label>
        <input id="codex_api_key" type="password" placeholder="（apikey 模式使用；留空则不变）">
      </div>
    </div>
    <div class="row">
      <div>
        <label for="repo_allowlist">仓库白名单（英文逗号分隔）</label>
        <input id="repo_allowlist" placeholder="owner/repo,owner2/repo2">
      </div>
      <div>
        <label for="timeout">Codex 超时</label>
        <input id="timeout" placeholder="30m">
      </div>
    </div>
    <button id="saveBtn">保存设置</button>
    <button class="secondary" id="reloadBtn">重新加载</button>
    <div class="msg" id="settingsMsg"></div>
    <p class="muted">密钥字段在已配置时显示 <code>***set***</code>。保持原样即沿用已存的值，输入新值则替换。保存会写入数据库；当前 worker/client 需要重启服务后才会使用新配置。</p>
  </section>

  <section>
    <h2>当前运行配置</h2>
    <button class="secondary" id="effectiveBtn">检查运行配置</button>
    <div class="msg" id="effectiveMsg"></div>
    <div id="effectiveConfig" class="compact"></div>
  </section>

  <section>
    <h2>Codex auth.json</h2>
    <p class="muted">上传 authfile 模式所需的 codex <code>auth.json</code>，必须包含 <code>tokens.refresh_token</code>。将以 0600 权限保存到 codex 主目录。</p>
    <input id="authFile" type="file" accept=".json,application/json">
    <button id="uploadBtn">上传 auth.json</button>
    <div class="msg" id="authMsg"></div>
  </section>

  <section>
    <h2>Codex 鉴权状态</h2>
    <button id="statusBtn">检查状态</button>
    <div class="msg" id="statusMsg"></div>
  </section>

  <section>
    <h2>近期任务</h2>
    <button class="secondary" id="jobsBtn">立即刷新</button>
    <span class="muted" id="jobsMeta"></span>
    <div style="overflow:auto; max-height: 420px; margin-top: 8px;">
      <table>
        <thead>
          <tr><th>ID</th><th>PR</th><th>事件</th><th>动作</th><th>状态</th><th>次数</th><th>创建时间</th><th>会话</th><th>错误/日志</th></tr>
        </thead>
        <tbody id="jobsBody"><tr><td colspan="9" class="muted">加载中…</td></tr></tbody>
      </table>
    </div>
  </section>

</main>
<script>
(function () {
  "use strict";
  // 字段 id -> 设置键。所有 id 与 lower_snake_case 的设置键一一对应。
  var FIELDS = ["gitea_url","gitea_token","webhook_secret","model","trigger_keywords",
                "concurrency","codex_auth_mode","codex_api_key","repo_allowlist","timeout"];
  var SECRETS = {gitea_token:1, webhook_secret:1, codex_api_key:1};
  var REDACTED = "***set***";

  function $(id){ return document.getElementById(id); }
  function show(el, text, ok){ el.textContent = text; el.className = "msg " + (ok ? "ok" : "err"); }

  function loadSettings(){
    fetch("/admin/api/settings").then(function(r){ return r.json(); }).then(function(s){
      FIELDS.forEach(function(k){
        var el = $(k); if (!el) return;
        var v = s[k] != null ? s[k] : "";
        el.value = v;
      });
      show($("settingsMsg"), "已加载", true);
    }).catch(function(e){ show($("settingsMsg"), "加载失败：" + e, false); });
  }

  function saveSettings(){
    var payload = {};
    FIELDS.forEach(function(k){
      var el = $(k); if (!el) return;
      var v = el.value;
      // 不重复提交密钥的脱敏占位符；服务端也会跳过，这里保持请求干净。
      if (SECRETS[k] && v === REDACTED) return;
      payload[k] = v;
    });
    fetch("/admin/api/settings", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({settings: payload})
    }).then(function(r){ return r.json().then(function(b){ return {ok:r.ok, b:b}; }); })
      .then(function(res){
        if (res.ok) { show($("settingsMsg"), "已保存 " + (res.b.updated||0) + " 项设置；重启服务后 worker/client 才会使用新值", true); loadSettings(); loadEffectiveConfig(); }
        else { show($("settingsMsg"), "保存失败：" + (res.b.error||""), false); }
      }).catch(function(e){ show($("settingsMsg"), "保存失败：" + e, false); });
  }

  function uploadAuth(){
    var f = $("authFile").files[0];
    if (!f) { show($("authMsg"), "请先选择文件", false); return; }
    f.text().then(function(text){
      return fetch("/admin/api/authfile", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: text
      });
    }).then(function(r){ return r.json().then(function(b){ return {ok:r.ok, b:b}; }); })
      .then(function(res){
        if (res.ok) show($("authMsg"), "已保存到 " + res.b.path, true);
        else show($("authMsg"), "已拒绝：" + (res.b.error||""), false);
      }).catch(function(e){ show($("authMsg"), "上传失败：" + e, false); });
  }

  function checkStatus(){
    show($("statusMsg"), "检查中…", true);
    fetch("/admin/api/status").then(function(r){ return r.json(); }).then(function(s){
      show($("statusMsg"), s.status || "（无状态信息）", !!s.ok);
    }).catch(function(e){ show($("statusMsg"), "检查失败：" + e, false); });
  }

  function esc(s){ var d = document.createElement("div"); d.textContent = s == null ? "" : String(s); return d.innerHTML; }

  function loadEffectiveConfig(){
    fetch("/admin/api/effective-config").then(function(r){ return r.json(); }).then(function(c){
      if (!c.ok) { show($("effectiveMsg"), "读取失败：" + (c.error || ""), false); return; }
      $("effectiveConfig").innerHTML =
        "<p><strong>Gitea 地址：</strong><code>" + esc(c.gitea_url || "未加载") + "</code></p>" +
        "<p><strong>Gitea 令牌：</strong>" + (c.gitea_token_set ? "已加载" : "未加载") +
        "　<strong>Webhook 密钥：</strong>" + (c.webhook_secret_set ? "已加载" : "未加载") + "</p>" +
        "<p><strong>模型：</strong><code>" + esc(c.model || "") + "</code>　<strong>鉴权：</strong><code>" + esc(c.codex_auth_mode || "") + "</code>　<strong>并发：</strong><code>" + esc(c.concurrency) + "</code></p>" +
        "<p><strong>配置来源：</strong><code>" + esc(c.config_source || "db-over-env") + "</code></p>" +
        "<p class='muted'>" + esc(c.runtime_reload_note || "") + "</p>";
      show($("effectiveMsg"), "已读取当前进程配置", true);
    }).catch(function(e){ show($("effectiveMsg"), "读取失败：" + e, false); });
  }

  function loadJobs(){
    fetch("/admin/api/jobs").then(function(r){ return r.json(); }).then(function(jobs){
      var body = $("jobsBody");
      if (!jobs || !jobs.length) { body.innerHTML = '<tr><td colspan="9" class="muted">暂无任务</td></tr>'; }
      else {
        body.innerHTML = jobs.map(function(j){
          var pr = esc(j.owner) + "/" + esc(j.repo) + "#" + esc(j.number);
          var st = esc(j.status);
          var created = j.created_at ? esc(j.created_at.replace("T"," ").replace("Z","")) : "";
          var sess = j.session_id ? "<code>" + esc(j.session_id.slice(0,8)) + "</code>" : "";
          var err = j.error ? "<pre class='log'>" + esc(j.error) + "</pre>" : "";
          return "<tr><td>" + esc(j.id) + "</td><td>" + pr + "</td><td>" + esc(j.event) +
                 "</td><td>" + esc(j.action) + "</td><td><span class='badge s-" + st + "'>" + st +
                 "</span></td><td>" + esc(j.attempts) + "</td><td>" + created + "</td><td>" + sess + "</td><td>" + err + "</td></tr>";
        }).join("");
      }
      $("jobsMeta").textContent = " 更新于 " + new Date().toLocaleTimeString();
    }).catch(function(e){ $("jobsBody").innerHTML = '<tr><td colspan="9" class="err">加载失败：' + esc(e) + '</td></tr>'; });
  }

  $("saveBtn").addEventListener("click", saveSettings);
  $("reloadBtn").addEventListener("click", loadSettings);
  $("effectiveBtn").addEventListener("click", loadEffectiveConfig);
  $("uploadBtn").addEventListener("click", uploadAuth);
  $("statusBtn").addEventListener("click", checkStatus);
  $("jobsBtn").addEventListener("click", loadJobs);

  loadSettings();
  loadEffectiveConfig();
  loadJobs();
  setInterval(loadJobs, 10000);
})();
</script>
</body>
</html>
