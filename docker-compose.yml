services:
  codex-gitea:
    # Local build, or pull the CI-published image instead:
    # image: ghcr.io/OWNER/codex-gitea:latest
    build: .
    ports:
      - "8080:8080"
    environment:
      # Required: protects the /admin console. No password => console returns 503.
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in your environment or .env}
      # Everything below is optional here — the /admin console writes these into
      # the DB, and DB settings override env. Set them here only to bootstrap.
      GITEA_URL: ${GITEA_URL:-}
      GITEA_TOKEN: ${GITEA_TOKEN:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      MODEL: ${MODEL:-gpt-5-codex}
      CODEX_AUTH_MODE: ${CODEX_AUTH_MODE:-authfile}
      CLAUDE_ENABLED: ${CLAUDE_ENABLED:-false}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-sonnet}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      CLAUDE_BASE_URL: ${CLAUDE_BASE_URL:-}
      CLAUDE_HOME: /claude-home
      CC_SWITCH_CONFIG_DIR: /cc-switch
      CC_SWITCH_PROVIDER_ID: ${CC_SWITCH_PROVIDER_ID:-}
      # apikey mode only (separately billed OpenAI Platform key):
      # CODEX_API_KEY: ${CODEX_API_KEY:-}
    volumes:
      - data:/data            # sqlite db (jobs, PR sessions, findings, settings)
      - cache:/cache          # bare git mirrors (incremental fetch)
      - work:/work            # throwaway worktrees
      - codex-home:/codex-home # codex auth.json + sessions (MUST be writable)
      - claude-home:/claude-home # Claude Code settings/session state
      - cc-switch:/cc-switch  # cc-switch provider/proxy config
    restart: unless-stopped

volumes:
  data:
  cache:
  work:
  codex-home:
  claude-home:
  cc-switch:
